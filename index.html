<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sistem Presensi Perawat - Puskesmas Sampanahan</title>

    <meta name="theme-color" content="#0d9488" id="meta-theme-color">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nurse Presence">
    
    <!-- External Resources -->

    <style>
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --primary-light: #f0fdfa;
            --accent: #f43f5e;
            --bg: #f8fafc;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        body {
            background-color: #f1f5f9;
            height: 100dvh;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app-container { 
            width: 100%;
            max-width: 500px; 
            background: white; 
            height: 100dvh; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .scrollable-content {
            flex: 1; 
            overflow-y: auto; 
            scrollbar-width: none;
        }
        .scrollable-content::-webkit-scrollbar { display: none; }

        .view-content { display: none; height: 100%; }
        .view-content.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .rekap-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            border-radius: 20px; 
            background: white; 
            border: 1px solid #e2e8f0; 
        }
        .editor-table { border-collapse: collapse; min-width: 800px; font-size: 11px; }
        .editor-table th, .editor-table td { border: 1px solid #f1f5f9; text-align: center; padding: 12px 8px; }
        .editor-table th { background: #f8fafc; font-weight: 800; color: #64748b; text-transform: uppercase; font-size: 9px; }
        
        .sticky-col { 
            position: sticky; left: 0; background: white !important; z-index: 10; 
            min-width: 130px; text-align: left !important; padding-left: 16px !important; 
            border-right: 2px solid #f1f5f9 !important; font-weight: 700; color: #1e293b;
        }

        .sticky-col-right {
            position: sticky; right: 0; background: #f0fdfa !important; z-index: 10;
            min-width: 60px; border-left: 3px double #0d9488 !important;
            font-weight: 800; color: #0d9488;
            box-shadow: -5px 0 15px rgba(0,0,0,0.02);
        }
        thead th.sticky-col-right { background: #e6fffa !important; }

        .cell-P { background-color: #ccfbf1 !important; color: #0d9488 !important; }
        .cell-S { background-color: #fef3c7 !important; color: #d97706 !important; }
        .cell-M { background-color: #dbeafe !important; color: #2563eb !important; }

        .dashboard-nav {
            background: white; border-top: 1px solid #f1f5f9;
            padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            display: flex; flex-direction: column; gap: 12px; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05); z-index: 100; border-radius: 30px 30px 0 0;
        }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px; border-radius: 16px; color: #94a3b8; transition: 0.3s;
        }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }

        .btn-primary {
            background: var(--primary); color: white;
            padding: 16px; border-radius: 18px; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s; box-shadow: 0 10px 20px rgba(13, 148, 136, 0.2);
        }
        .btn-primary:active { transform: scale(0.97); }

        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); z-index: 1000; 
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-card { 
            background: white; width: 100%; max-width: 400px; border-radius: 28px; 
            overflow: hidden; animation: modalSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #custom-alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            width: 90%; max-width: 380px; background: white; z-index: 2000;
            padding: 16px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 12px; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            opacity: 0;
        }
        #custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease;
            opacity: 0;
        }
        .accordion-content.open {
            max-height: 800px;
            opacity: 1;
        }
        .arrow-icon {
            transition: transform 0.3s ease;
        }
        .arrow-icon.rotated {
            transform: rotate(180deg);
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .status-pulse { animation: pulse 2s infinite; }
    </style>
</head>

<!-- MODAL: SCANNER -->
<div id="modal-scan" class="modal-overlay" onclick="if(event.target === this) closeScan()">
    <div class="modal-card">

            </div>

</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-Fl_qSNgqr9oEnn3vUmCtN4bRCZ5M7wz5YMiofUD33pN-kICuL6zubelKVcI_k2luXg/exec";
    const QR_SECRET = "SISTEM-PRO-01";

    const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    let state = {
        user: localStorage.getItem('nurse_user') || null,
        data: { officers: [], logs: [], schedule: {}, chat: [], config: {} },
        scanner: null,
        isScheduleExpanded: false,
        isWithinRadius: true, 
        userDistance: 0,
        lastRadiusStatus: null 
    };

    function safeNavigate(url) {
        if (!url) return;
        try {
            if (window.self !== window.top) { window.open(url, '_top'); } 
            else { window.location.href = url; }
        } catch (e) { window.location.assign(url); }
    }

    // --- LOGIKA GPS ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function updateGPS() {
        const indicator = document.getElementById('gps-indicator');
        const cfg = state.data.config || {};
        
        // JIKA GPS LOCK DIAKTIFKAN (gpsLock === true)
        if (cfg.gpsLock === true) {
            if (indicator) indicator.classList.remove('hidden');

            if (!navigator.geolocation) {
                updateGPSUI("ERROR", "GPS Tidak Didukung");
                return;
            }

            navigator.geolocation.getCurrentPosition((pos) => {
                // Koordinat target dari admin
                const targetLat = parseFloat(cfg.lat) || -2.6789;
                const targetLng = parseFloat(cfg.lng) || 116.1234;
                const allowedRad = parseInt(cfg.radius) || 100;

                const dist = getDistance(pos.coords.latitude, pos.coords.longitude, targetLat, targetLng);
                state.userDistance = dist;
                state.isWithinRadius = dist <= allowedRad;
                
                if (state.isWithinRadius) {
                    updateGPSUI("OK", "Dalam Radius");
                    state.lastRadiusStatus = "OK";
                } else {
                    updateGPSUI("OUT", `${Math.round(dist)}m Diluar`);
                    if (state.lastRadiusStatus !== "OUT") {
                        showAlert("Peringatan Lokasi", `Anda berada diluar radius (${Math.round(dist)}m). Presensi hanya dapat dilakukan di area Puskesmas.`, "error");
                        state.lastRadiusStatus = "OUT";
                    }
                }
            }, (err) => {
                updateGPSUI("ERROR", "GPS Terkunci");
            }, { enableHighAccuracy: true });
        } else {
            // JIKA GPS LOCK DIMATIKAN (OFF)
            state.isWithinRadius = true;
            if (indicator) indicator.classList.add('hidden');
        }
    }

    function updateGPSUI(status, label) {
        const indicator = document.getElementById('gps-indicator');
        const labelEl = document.getElementById('gps-label');
        if (!indicator || !labelEl) return;

        indicator.classList.remove('bg-white/10', 'bg-emerald-500/30', 'bg-rose-500/30', 'border-white/10', 'border-emerald-400', 'border-rose-400');

        labelEl.innerText = label;
        if (status === "OK") {
            indicator.classList.add('bg-emerald-500/30', 'border-emerald-400');
        } else if (status === "OUT") {
            indicator.classList.add('bg-rose-500/30', 'border-rose-400');
        } else {
            indicator.classList.add('bg-white/10', 'border-white/10');
        }
    }

    function showAlert(title, msg, type = 'success') {
        const alert = document.getElementById('custom-alert');
        if (!alert) return;
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-msg').innerText = msg;
        const icon = document.getElementById('alert-icon');
        icon.className = `w-10 h-10 rounded-full flex items-center justify-center text-xl ${type === 'error' ? 'bg-rose-50 text-rose-600' : 'bg-teal-50 text-teal-600'}`;
        icon.innerHTML = type === 'error' ? '✕' : '✓';
        alert.classList.add('show');
        setTimeout(() => alert.classList.remove('show'), 5000);
    }

    function showLoading(show) { document.getElementById('loading-overlay').classList.toggle('hidden', !show); }

    function getShift() {
        const hr = new Date().getHours();
        if(hr >= 8 && hr < 14) return { label: 'Pagi', code: 'P', icon: '☀️' };
        if(hr >= 14 && hr < 20) return { label: 'Siang', code: 'S', icon: '🌤️' };
        return { label: 'Malam', code: 'M', icon: '🌙' };
    }

    function getLogicalDate(date) {
        let d = new Date(date);
        if (d.getHours() < 8) d.setDate(d.getDate() - 1);
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yyyy = d.getFullYear();
        return `${dd}/${mm}/${yyyy}`;
    }

    function toggleSchedule() {
        state.isScheduleExpanded = !state.isScheduleExpanded;
        const container = document.getElementById('planned-list-container');
        const arrow = document.getElementById('schedule-arrow');
        if (state.isScheduleExpanded) {
            container.classList.add('open');
            arrow.classList.add('rotated');
        } else {
            container.classList.remove('open');
            arrow.classList.remove('rotated');
        }
    }

    async function apiRequest(action, payload = {}) {
        const url = `${WEB_APP_URL}?action=${action}`;
        const options = action === 'getData' ? {} : { method: 'POST', body: JSON.stringify({ action, payload }) };
        try { const r = await fetch(url, options); return await r.json(); }
        catch (e) { throw e; }
    }

    async function fetchData(silent = false) {
        if(!silent) showLoading(true);
        try { 
            const result = await apiRequest('getData'); 
            state.data = result; 
            renderAll(); 
            updateGPS(); 
        }
        catch (e) { showAlert("Koneksi Gagal", "Gagal menghubungi server.", "error"); }
        finally { showLoading(false); }
    }

    function renderAll() {
        const now = new Date();
        const sh = getShift();
        const logicalDateStr = getLogicalDate(now);
        
        const clockEl = document.getElementById('clock');
        if(clockEl) clockEl.innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const dateEl = document.getElementById('date-label');
        if(dateEl) dateEl.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
        const shLbl = document.getElementById('shift-label');
        if(shLbl) shLbl.innerText = `Shift ${sh.label}`;
        const shIco = document.getElementById('shift-icon');
        if(shIco) shIco.innerText = sh.icon;
        const schDet = document.getElementById('schedule-date-detail');
        if(schDet) schDet.innerText = logicalDateStr;

        const dispName = document.getElementById('display-name');
        if(dispName) dispName.innerText = state.user ? `Halo, ${state.user}` : "Halo, Rekan Medis";
        const btnOut = document.getElementById('btn-logout');
        if(btnOut) btnOut.classList.toggle('hidden', !state.user);
        const cardLog = document.getElementById('card-login');
        if(cardLog) cardLog.classList.toggle('hidden', !!state.user);
        const secSch = document.getElementById('section-schedule');
        if(secSch) secSch.classList.toggle('hidden', !state.user);
        const secAct = document.getElementById('section-actual');
        if(secAct) secAct.classList.toggle('hidden', !state.user);

        const select = document.getElementById('select-user');
        if(select) {
            const optionsHtml = '<option value="">-- Pilih Nama --</option>' + state.data.officers.map(o => `<option value="${o}">${o}</option>`).join('');
            if (select.innerHTML !== optionsHtml && document.activeElement !== select) { select.innerHTML = optionsHtml; }
        }

        let schedHtml = '';
        const dayForLookup = parseInt(logicalDateStr.split('/')[0]);
        ['Pagi', 'Siang', 'Malam'].forEach(s => {
            const code = s[0];
            const isTarget = s === sh.label;
            const names = state.data.officers.filter(n => {
                const personSched = state.data.schedule[n] || state.data.schedule[n.toUpperCase()];
                return personSched && (personSched[dayForLookup] === code || personSched[String(dayForLookup)] === code);
            });
            schedHtml += `
                <div class="bg-slate-50 p-4 rounded-2xl border ${isTarget ? 'border-teal-200 ring-2 ring-teal-50 bg-white' : 'border-slate-100'} flex flex-col gap-2 transition-all">
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-black uppercase tracking-widest ${isTarget ? 'text-teal-600' : 'text-slate-400'}">${s}</span>
                        ${isTarget ? '<span class="flex items-center gap-1.5"><span class="text-[7px] font-black text-teal-500 uppercase">Sekarang</span><span class="w-1.5 h-1.5 rounded-full bg-teal-500 animate-ping"></span></span>' : ''}
                    </div>
                    <div class="flex flex-wrap gap-1.5">
                        ${names.length ? names.map(n => `<span class="px-2.5 py-1.5 bg-white border border-slate-100 shadow-sm text-slate-700 rounded-xl text-[9px] font-black uppercase">${n}</span>`).join('') : '<span class="text-[9px] italic text-slate-300 font-bold uppercase py-1">Tidak ada jadwal</span>'}
                    </div>
                </div>`;
        });
        const planList = document.getElementById('planned-list');
        if(planList) planList.innerHTML = schedHtml;

        const logsToShow = state.data.logs.filter(l => l.name && l.date === logicalDateStr);
        const actList = document.getElementById('actual-list');
        if(actList) {
            actList.innerHTML = logsToShow.length ? logsToShow.map(l => {
                const isCurrentShiftActive = (l.shift === sh.label);
                let statusText = isCurrentShiftActive ? "Sedang Jaga" : "Sudah Selesai";
                let statusColorClass = isCurrentShiftActive ? "text-emerald-500" : "text-slate-400";
                let statusBgClass = isCurrentShiftActive ? "bg-emerald-50" : "bg-slate-50";
                let dotColorClass = isCurrentShiftActive ? "bg-emerald-500 animate-pulse" : "bg-slate-300";

                return `
                <div class="bg-white p-3.5 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-teal-600 text-white flex items-center justify-center font-black text-sm relative">
                            ${l.name ? l.name[0] : '?'}
                            <span class="absolute -top-1 -right-1 w-2.5 h-2.5 ${dotColorClass} border-2 border-white rounded-full"></span>
                        </div>
                        <div>
                            <p class="text-[10px] font-black uppercase text-slate-800">${l.name || 'Petugas'}</p>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-tighter">Shift ${l.shift} • ${l.time}</p>
                        </div>
                    </div>
                    <div class="${statusBgClass} ${statusColorClass} px-3 py-1.5 rounded-xl text-[8px] font-black uppercase tracking-widest border border-current/10">
                        ${statusText}
                    </div>
                </div>`;
            }).join('') : '<p class="text-center py-6 text-[9px] font-bold text-slate-300 uppercase tracking-[0.2em]">Belum ada data presensi periode ini</p>';
        }

        renderRekap();
    }

    function renderRekap() {
        const viewRekap = document.getElementById('view-rekap');
        if (!viewRekap || !viewRekap.classList.contains('active')) return;
        const now = new Date(); const daysInMo = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        let table = `<table class="editor-table"><thead><tr><th class="sticky-col">PERAWAT</th>`;
        for(let d=1; d<=daysInMo; d++) table += `<th>${d}</th>`;
        table += `<th class="sticky-col-right text-slate-800">TOT</th></tr></thead><tbody>`;
        state.data.officers.forEach(name => {
            let total = 0; table += `<tr><td class="sticky-col uppercase text-[9px]">${name}</td>`;
            for(let d=1; d<=daysInMo; d++) {
                const log = state.data.logs.find(l => {
                    if(!l.date) return false;
                    const p = l.date.split('/');
                    return l.name === name && parseInt(p[0]) === d && parseInt(p[1]) === (now.getMonth() + 1);
                });
                const code = log ? log.shift[0] : ''; if(code) total++;
                table += `<td class="cell-${code} font-bold">${code}</td>`;
            }
            table += `<td class="sticky-col-right font-black text-slate-800">${total}</td></tr>`;
        });
        const rekCont = document.getElementById('rekap-container');
        if(rekCont) rekCont.innerHTML = table + `</tbody></table>`;
        const rekPer = document.getElementById('rekap-period');
        if(rekPer) rekPer.innerText = `${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
    }

    function loginUser() {
        const sel = document.getElementById('select-user');
        const val = sel ? sel.value : null;
        if(!val) return showAlert("Peringatan", "Pilih nama perawat dahulu.", "error");
        state.user = val; localStorage.setItem('nurse_user', val);
        renderAll(); showAlert("Selamat Datang", `Sesi Anda aktif.`);
    }

    function logout() {
        if(confirm("Keluar dari sesi?")) { localStorage.removeItem('nurse_user'); state.user = null; renderAll(); }
    }

    function showView(v) {
        document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
        const vEl = document.getElementById(`view-${v}`);
        if(vEl) vEl.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const nEl = document.getElementById(`nav-${v}`);
        if(nEl) nEl.classList.add('active');
        renderAll();
    }

    async function openScan() {
        if(!state.user) return showAlert("Akses Ditolak", "Login sebagai perawat.", "error");
        
        // VALIDASI GPS HANYA JIKA AKTIF DI CONFIG
        if (state.data.config && state.data.config.gpsLock === true) {
            updateGPS();
            if (!state.isWithinRadius) {
                return showAlert("Lokasi Tidak Valid", `Anda berada ${Math.round(state.userDistance)}m di luar area Puskesmas. Mohon mendekat ke lokasi.`, "error");
            }
        }

        document.getElementById('modal-scan').style.display = 'flex';
        state.scanner = new Html5Qrcode("reader");
        try {
            await state.scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, async (txt) => {
                if(txt === QR_SECRET) { await state.scanner.stop(); closeScan(); submitPresence(); }
            });
        } catch (e) { showAlert("Kamera Eror", "Gagal akses kamera.", "error"); closeScan(); }
    }

    function closeScan() { if(state.scanner) state.scanner.stop().catch(console.error); document.getElementById('modal-scan').style.display = 'none'; }

    async function submitPresence() {
        const sh = getShift(); const now = new Date(); showLoading(true);
        try {
            const res = await apiRequest('saveScan', { 
                name: state.user, date: getLogicalDate(now), 
                shift: sh.label, time: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) 
            });
            if(res.status === 'success') { showAlert("Berhasil", "Kehadiran dicatat."); fetchData(true); }
        } catch (e) { showAlert("Gagal", "Gagal simpan data.", "error"); }
        finally { showLoading(false); }
    }

    function exportCurrentMonth() {
        const t = document.getElementById('rekap-container').querySelector('table');
        if(!t) return;
        const wb = XLSX.utils.table_to_book(t);
        XLSX.writeFile(wb, `Rekap_Presensi_${MONTHS[new Date().getMonth()]}.xlsx`);
    }

    window.onload = () => {
        fetchData();
        setInterval(() => { renderAll(); }, 1000);
        setInterval(() => {
            if (state.data.config && state.data.config.gpsLock === true) updateGPS();
        }, 10000); 
        setInterval(() => fetchData(true), 30000);
    };
</script>
</body>
</html>
